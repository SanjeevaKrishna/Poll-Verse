<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PollVerse – Vote on Everything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --text: #f0f0fa;
      --muted: #6b6b8a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 80px 24px 60px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }

    h1 span {
      background: linear-gradient(135deg, #f97316, #8b5cf6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 18px;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }

    /* Poll cards grid */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .card:hover::before { transform: scaleX(1); }
    .card:hover { border-color: color-mix(in srgb, var(--accent) 40%, transparent); }

    .card-emoji { font-size: 48px; margin-bottom: 16px; display: block; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-desc { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .card-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    .card-cta {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
    }

    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero { animation: fadeUp 0.6s ease both; }
    .card { animation: fadeUp 0.6s ease both; }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🗳️ Live Polls</div>
  <h1>Vote on<br/><span>Everything.</span></h1>
  <p class="hero-sub">Pick a poll below and cast your vote. Results update in real time.</p>
</div>

<div class="grid" id="grid">
  <!-- Cards injected by JS -->
</div>

<footer class="footer">Built with ♥ · PollVerse</footer>

<script>
  fetch('./polls.json')
    .then(r => r.json())
    .then(data => {
      const grid = document.getElementById('grid');
      data.polls.forEach(poll => {
        const card = document.createElement('a');
        card.href = `./pages/${poll.slug}.html`;
        card.className = 'card';
        card.style.setProperty('--accent', poll.color);
        card.innerHTML = `
          <span class="card-emoji">${poll.emoji}</span>
          <div class="card-title">${poll.title}</div>
          <div class="card-desc">${poll.description}</div>
          <div class="card-meta">
            <span class="card-dot"></span>
            ${poll.options.length} options · Open now
          </div>
          <div class="card-cta">Vote now →</div>
        `;
        grid.appendChild(card);
      });
    });
</script>
</body>
</html>
